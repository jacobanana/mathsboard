<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Language Board</title>
<!-- Installable PWA (Language board) — a SEPARATE app from the Maths board,
     with its own manifest and icons scoped to /language/. Icon paths reach up
     into the shared /icons/ folder; the manifest sits alongside this page. All
     relative so it works under the GitHub Pages repo subpath too. -->
<meta name="description" content="An infinite-canvas whiteboard for teaching and learning languages together.">
<meta name="theme-color" content="#F97316">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="../icons/lang.svg">
<link rel="icon" type="image/png" sizes="192x192" href="../icons/lang-192.png">
<!-- iOS: no manifest install prompt, so these drive Add-to-Home-Screen. -->
<link rel="apple-touch-icon" href="../icons/lang-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Language Board">
</head>
<body>
<div id="root"></div>
<!-- Same entry as the maths board: main.tsx reads the /language/ path and
     assembles the language tools instead of the maths ones (see src/subject.ts). -->
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
