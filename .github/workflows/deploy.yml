name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Fast unit suite (shared with e2e.yml / publish.yml via the reusable
  # workflow): the static single-user build ships the exact code the suite
  # covers, so a red suite must block the Pages rollout too.
  unit:
    uses: ./.github/workflows/unit-run.yml

  build:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute version
        id: version
        uses: ./.github/actions/app-version

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # GitHub Pages is static hosting with no backend, so compile out the
        # collaboration + image-upload features (see src/config.ts). The app
        # ships as a fully-working single-user whiteboard.
        run: npm run build
        env:
          VITE_COLLAB: "0"
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
