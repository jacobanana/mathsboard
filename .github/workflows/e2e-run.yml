# Reusable end-to-end job for the collaboration system.
#
# Brings up the same compose stack docker-compose.local.yml documents for
# manual testing (Caddy + token API + Y-Sweet + MinIO, production frontend
# build on :8080) and runs the Playwright suite in e2e/ against it with two
# real browser contexts per collaboration test.
#
# Single source of truth for the suite: called by e2e.yml (PRs / manual) and
# by publish.yml (to gate the VPS deploy on main). It has no push/PR trigger of
# its own, so it only runs when another workflow calls it.

name: E2E (reusable)

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start the collaboration stack
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

      - name: Wait for the stack to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/health > /dev/null 2>&1; then
              echo "stack is up"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not become healthy in time" >&2
          docker compose -f docker-compose.yml -f docker-compose.local.yml logs --no-color
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080

      - name: Stack logs (on failure)
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml logs --no-color

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
