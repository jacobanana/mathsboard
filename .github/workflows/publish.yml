# Build the two app images (web + api) on GitHub's runners, push them to the
# GitHub Container Registry (public), then SSH to the VPS and roll it over.
# The VPS never builds - it only pulls. GHCR push uses the built-in
# GITHUB_TOKEN, so no registry secret is needed.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_HOST      the floating IP (or board.<domain>) of the VPS
#   DEPLOY_USER      the instance login user (Infomaniak Ubuntu images: "ubuntu")
#   DEPLOY_SSH_KEY   private key whose public half Terraform put on the instance

name: Publish & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast unit suite first (shared with e2e.yml / deploy.yml via the reusable
  # workflow): a logic regression fails here in ~2 minutes and skips the whole
  # 30-min e2e + build + deploy chain.
  unit:
    uses: ./.github/workflows/unit-run.yml

  # Collaboration e2e suite (shared with e2e.yml via the reusable workflow).
  # build gates on it, so a red suite blocks image build/push and the VPS
  # rollover entirely - nothing untested is ever published. A red/skipped e2e
  # also blocks deploy via its explicit `needs.e2e.result == 'success'` check,
  # so the unit gate propagates all the way down.
  e2e:
    needs: unit
    uses: ./.github/workflows/e2e-run.yml

  # Decide what actually changed so a frontend-only or server-only push doesn't
  # rebuild both images. Runs in parallel with e2e (it's a cheap git diff); the
  # build gate on e2e still holds because build needs both jobs.
  #
  # Path detection compares only the commits in *this* push, not against what is
  # currently deployed - so if an earlier image change never deployed (e.g. a
  # failed run) a later unrelated push won't pick it up. workflow_dispatch is the
  # escape hatch: a manual run forces a full rebuild of both images.
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}   # build matrix of only changed images
      build: ${{ steps.set.outputs.build }}      # 'true' if any image needs rebuilding
      deploy: ${{ steps.set.outputs.deploy }}    # 'true' if anything needs deploying
    steps:
      - uses: actions/checkout@v5

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # web mirrors the COPY set in deploy/Dockerfile.web - keep in sync.
            web:
              - 'src/**'
              - 'public/**'
              - 'language/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'deploy/Dockerfile.web'
            api:
              - 'server/**'
            # No image rebuild, but the VPS still needs a redeploy to apply these
            # (docker-compose.yml is not baked in; the Caddyfile is bind-mounted).
            deploycfg:
              - 'docker-compose.yml'
              - 'deploy/Caddyfile'

      - name: Assemble build matrix
        id: set
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
          WEB: ${{ steps.filter.outputs.web }}
          API: ${{ steps.filter.outputs.api }}
          DEPLOYCFG: ${{ steps.filter.outputs.deploycfg }}
          # Optional Umami tracker URL + website id, baked into the web bundle at
          # build time. Empty unless set as repo variables (Settings -> Secrets
          # and variables -> Actions -> Variables). See the README "Analytics".
          UMAMI_SRC: ${{ vars.UMAMI_SRC }}
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
        run: |
          web=$WEB
          api=$API
          if [ "$FORCE" = "true" ]; then
            web=true
            api=true
          fi
          include='[]'
          if [ "$web" = "true" ]; then
            include=$(jq -cn --argjson a "$include" --arg src "$UMAMI_SRC" --arg id "$UMAMI_WEBSITE_ID" \
              '$a + [{"image":"web","context":".","dockerfile":"deploy/Dockerfile.web","buildArgs":"UMAMI_SRC=\($src)\nUMAMI_WEBSITE_ID=\($id)"}]')
          fi
          if [ "$api" = "true" ]; then
            include=$(jq -cn --argjson a "$include" \
              '$a + [{"image":"api","context":"server","dockerfile":"server/Dockerfile","buildArgs":""}]')
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          if [ "$include" = "[]" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi
          if [ "$include" != "[]" ] || [ "$DEPLOYCFG" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
          echo "web=$web api=$api deploycfg=$DEPLOYCFG force=$FORCE -> $include"

  build:
    needs: [e2e, changes]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute version
        id: version
        uses: ./.github/actions/app-version

      # Buildx's docker-container driver is required for the type=gha cache
      # export below (the default docker driver can't export cache).
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Both Dockerfiles declare ARG APP_VERSION; web maps it to
          # VITE_APP_VERSION, api reads it at runtime. matrix.buildArgs carries
          # per-image extras (the web image's optional UMAMI_WEBSITE_ID); it's an
          # empty line for the api image, which build-push-action ignores.
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            ${{ matrix.buildArgs }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [e2e, changes, build]
    runs-on: ubuntu-latest
    # always() so a *skipped* build (deploy-config-only change) still deploys;
    # the explicit checks re-impose the gates always() drops:
    #   - only auto-deploy from main; PRs/forks never touch the server
    #   - e2e must have passed (a red suite skips build, which always() ignores)
    #   - a failed/cancelled build must block the rollover
    #   - something must actually need deploying
    if: >-
      always()
      && github.ref == 'refs/heads/main'
      && needs.e2e.result == 'success'
      && needs.build.result != 'failure'
      && needs.build.result != 'cancelled'
      && needs.changes.outputs.deploy == 'true'
    steps:
      - name: Pull new images on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/mathsboard
            git pull --ff-only
            docker compose pull
            docker compose up -d
            # The Caddyfile is bind-mounted, so `up -d` won't recreate the web
            # container for a routing-only change - reload it explicitly so
            # Caddyfile edits take effect. Runs AFTER `up -d` so web is
            # guaranteed running (a cold start would otherwise die here with
            # "service web is not running"). Near no-op when the config is
            # unchanged; fails the deploy loudly if the new Caddyfile is invalid
            # (Caddy keeps serving the old config in that case).
            docker compose exec -T web caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
            docker image prune -f

  # Record every successful deploy as a GitHub Release, tagged with the same
  # CalVer+sha version baked into the images. needs: deploy means it only runs
  # when a deploy actually happened (skipped/failed deploy -> no release). Tag
  # pushes don't match this workflow's push:branches trigger, so no loop.
  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Compute version
        id: version
        uses: ./.github/actions/app-version

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          # Re-runs of the same commit would clash on the tag; treat as a no-op.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists, skipping"
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --target "${{ github.sha }}"
          fi
