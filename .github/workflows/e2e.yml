# Pre-merge tests: the fast unit suite gating the collaboration e2e suite.
#
# On pull requests this runs unit → e2e (shared with publish.yml via the
# reusable unit-run.yml / e2e-run.yml) for pre-merge feedback. It is
# intentionally NOT triggered on push to main: there the same jobs run inside
# publish.yml to gate the VPS deploy, so triggering here too would run the
# 30-min e2e suite twice per main push.

name: E2E tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    uses: ./.github/workflows/unit-run.yml

  # A red unit suite skips e2e entirely: no point spending 30 minutes of
  # Docker + browsers on a build whose logic is already known-broken.
  e2e:
    needs: unit
    uses: ./.github/workflows/e2e-run.yml
