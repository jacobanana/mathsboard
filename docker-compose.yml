# Production stack - one VPS, one domain, three containers:
#
#   web    - Caddy: TLS + routing + the static frontend build
#   api    - token endpoint + image upload proxy (server/)
#   ysweet - the Y-Sweet sync server, persisting to S3
#
# Setup:  cp .env.example .env   (fill it in - see the README "Deploy" section)
# Run:    docker compose up -d --build
#
# For a full LOCAL end-to-end test (no domain, no S3 account, no .env needed):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
# then open http://localhost:8080 - see docker-compose.local.yml.

services:
  web:
    # Image is built + pushed to GHCR by .github/workflows/publish.yml; the VPS
    # only pulls it. For a local source build, docker-compose.local.yml adds
    # `build:` back so `up --build` compiles from src/ instead.
    image: ghcr.io/jacobanana/mathboard-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:8080}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # ACME account + certificates - keep across restarts
      - caddy_config:/config
    depends_on:
      - api
      - ysweet

  api:
    image: ghcr.io/jacobanana/mathboard-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # All configuration (connection string, S3 bucket + creds) comes from .env;
    # required:false lets the local-test overlay run without one.
    env_file:
      - path: .env
        required: false
    depends_on:
      - ysweet

  ysweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    restart: unless-stopped
    # The image has no ENTRYPOINT, so `command` must name the binary itself
    # (default CMD is ["y-sweet", ...]). Without "y-sweet" here Docker tries to
    # exec "serve" directly and fails: `exec: "serve": executable file not found`.
    command: ["y-sweet", "serve", "--prod"]
    env_file:
      - path: .env
        required: false
    environment:
      # Reachable from the other containers (the binary binds 127.0.0.1 by
      # default); never published on the host - only Caddy talks to it.
      Y_SWEET_HOST: 0.0.0.0
      PORT: "8080"

  # --- Analytics: self-hosted Umami + its Postgres -----------------------------
  # Privacy-first, cookieless product analytics kept entirely on this box - no
  # third-party SaaS in the data path (Swiss-hosted, like everything else).
  # Umami stores events in a local Postgres; that Postgres is the ONLY stateful
  # piece added here, and the nightly pg_backup job below protects it by dumping
  # to the same S3 bucket under backups/.
  #
  # All three live behind the `analytics` compose profile, so the local e2e
  # overlay (docker-compose.local.yml, which sets no profile) never starts them.
  # Production opts in with COMPOSE_PROFILES=analytics in .env (see .env.example).
  postgres:
    image: postgres:16-alpine
    profiles: ["analytics"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: ["analytics"]
    restart: unless-stopped
    # Served same-origin at /umami by Caddy (see deploy/Caddyfile); BASE_PATH
    # tells the app it's mounted under that prefix. Register two websites in the
    # dashboard - one for this collab domain, one for the static GitHub Pages
    # build - to see them separately or combined. Change the default admin
    # password (admin / umami) on first login.
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      BASE_PATH: /umami
    depends_on:
      postgres:
        condition: service_healthy

  # Nightly pg_dump of the umami database -> s3://<bucket>/backups/, pruning
  # dumps older than BACKUP_KEEP_DAYS (the retention policy). Reuses the same S3
  # credentials/endpoint as the rest of the stack, mapped from the AWS_* names
  # the api/ysweet containers already use.
  #
  # Scope: backs up the `umami` database only. When Phase 2 adds the board-
  # metadata database, add a second pg_backup service (another POSTGRES_DATABASE)
  # or switch this to a pg_dumpall sidecar so the whole instance is captured.
  pg_backup:
    image: eeshugerman/postgres-backup-s3:16
    profiles: ["analytics"]
    restart: unless-stopped
    environment:
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: umami
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      S3_REGION: ${AWS_REGION}
      S3_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: backups
      S3_ENDPOINT: ${AWS_ENDPOINT_URL_S3}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  pg_data:
